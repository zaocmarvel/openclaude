services:
  - type: web
    name: bro2bro
    env: node
    plan: starter
    buildCommand: |
      cd Bro2Bro && npm install && npx prisma generate && npm run build
    startCommand: |
      cd Bro2Bro && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bro2bro-db
          property: connectionString
      - key: NEXTAUTH_URL
        value: https://bro2bro.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: bro2bro-db
    databaseName: bro2bro
    plan: starter
